<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PaveScan — Commercial Property Intelligence Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c10;--s1:#0d1117;--s2:#161b22;--s3:#21262d;
  --border:#30363d;--border2:#484f58;
  --accent:#39d353;--accent2:#f78166;--accent3:#58a6ff;--accent4:#e3b341;
  --text:#e6edf3;--muted:#8b949e;--muted2:#6e7681;
  --urgent:#ff6b6b;--high:#ffaa00;--med:#e3b341;--good:#39d353;
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden}

/* Scanline overlay */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

.app{display:flex;flex-direction:column;min-height:100vh}

/* ── Header ── */
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:0;height:52px;position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:0.05em;color:var(--accent);margin-right:24px;white-space:nowrap}
.logo span{color:var(--muted2)}
.header-divider{width:1px;height:24px;background:var(--border);margin:0 20px}
.nav-tabs{display:flex;gap:0;height:52px}
.nav-tab{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:0 18px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;height:100%;display:flex;align-items:center;gap:7px}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-badge{background:var(--accent);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;min-width:16px;text-align:center}
.nav-badge.warn{background:var(--high)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}
.status-dot.inactive{background:var(--muted2);box-shadow:none}
.status-label{font-size:10px;color:var(--muted);letter-spacing:0.05em}

/* ── Layout ── */
.content{flex:1;padding:28px;max-width:1500px;width:100%;margin:0 auto}
.panel-grid{display:grid;gap:20px}
.two-col{grid-template-columns:360px 1fr}
.panel{background:var(--s1);border:1px solid var(--border);padding:24px}
.panel-header{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.panel-header::after{content:'';flex:1;height:1px;background:var(--border)}
.panel-header-action{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent3);cursor:pointer;letter-spacing:0.05em}
.panel-header-action:hover{color:var(--text)}

/* ── Fields ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
.field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 12px;outline:none;transition:border-color 0.15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent3)}
.field textarea{resize:vertical;min-height:100px;line-height:1.6}
.field select option{background:var(--s2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row.three{grid-template-columns:1fr 1fr 1fr}

/* ── Buttons ── */
.btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:9px 22px;border:none;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn-green{background:var(--accent);color:#000}
.btn-green:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px)}
.btn-green:disabled{opacity:0.35;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){border-color:var(--text)}
.btn-ghost:disabled{opacity:0.35;cursor:not-allowed}
.btn-blue{background:var(--accent3);color:#000}
.btn-blue:hover:not(:disabled){filter:brightness(1.1)}
.btn-blue:disabled{opacity:0.35;cursor:not-allowed}
.btn-red{background:transparent;color:var(--urgent);border:1px solid var(--urgent)}
.btn-red:hover{background:var(--urgent);color:#fff}
.btn-orange{background:var(--accent2);color:#000}
.btn-sm{font-size:11px;padding:6px 14px}
.btn-xs{font-size:10px;padding:4px 10px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ── Progress ── */
.progress-wrap{margin-top:14px}
.progress-track{background:var(--bg);border:1px solid var(--border);height:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width 0.4s ease}
.progress-text{font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:0.04em}

/* ── Stats bar ── */
.stats-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:24px}
.stat{background:var(--s1);padding:14px 16px;text-align:center}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;line-height:1}
.stat-l{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.s-total .stat-n{color:var(--accent3)}
.s-urgent .stat-n{color:var(--urgent)}
.s-high .stat-n{color:var(--high)}
.s-med .stat-n{color:var(--med)}
.s-flagged .stat-n{color:var(--accent2)}
.s-enriched .stat-n{color:var(--accent)}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.filt{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s}
.filt.on{border-color:var(--accent);color:var(--accent);background:rgba(57,211,83,0.06)}
.filt:hover:not(.on){color:var(--text);border-color:var(--muted2)}
.sort-sel{margin-left:auto;background:var(--s2);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 8px;cursor:pointer;outline:none}

/* ── Results table ── */
.tbl{width:100%;border-collapse:collapse;border:1px solid var(--border);font-size:11px}
.tbl th{background:var(--s2);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted2);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:12px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,0.015)}

.score-box{width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;border:2px solid}
.sc1,.sc2,.sc3{color:var(--urgent);border-color:var(--urgent);background:rgba(255,107,107,0.08)}
.sc4,.sc5{color:var(--high);border-color:var(--high);background:rgba(255,170,0,0.08)}
.sc6,.sc7{color:var(--med);border-color:var(--med);background:rgba(227,179,65,0.08)}
.sc8,.sc9,.sc10{color:var(--good);border-color:var(--good);background:rgba(57,211,83,0.08)}

.ptag{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;margin-top:4px;display:inline-block}
.p-urgent{background:rgba(255,107,107,0.12);color:var(--urgent);border:1px solid rgba(255,107,107,0.25)}
.p-high{background:rgba(255,170,0,0.12);color:var(--high);border:1px solid rgba(255,170,0,0.25)}
.p-medium{background:rgba(227,179,65,0.12);color:var(--med);border:1px solid rgba(227,179,65,0.25)}
.p-low
